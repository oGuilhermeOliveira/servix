<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../assets/abelhaWhBG.png">
  <title>Fale conosco | Servix Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a href="../index.html" class="brand">Servix <span>Solutions</span></a>
      <nav class="menu">
        <a href="../index.html">Início</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container content-page">
      <h1>Fale conosco</h1>
      <p class="section-sub">Escolha o canal mais conveniente. Respondemos em até 2 dias úteis.</p>

      <div class="contact-channels" id="contact-channels"></div>
    </div>
  </main>

  <div class="theme-fab" id="theme-switcher">
    <button id="theme-fab-button" class="theme-fab-button" type="button" aria-label="Abrir menu de tema" aria-expanded="false" aria-controls="theme-menu">
      <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
      <span class="theme-icon theme-icon-moon" aria-hidden="true">☽</span>
    </button>
    <div id="theme-menu" class="theme-menu" hidden>
      <button class="theme-menu-item" type="button" data-theme-mode="light"><span class="theme-item-icon" aria-hidden="true">☀</span><span>Tema claro</span></button>
      <button class="theme-menu-item" type="button" data-theme-mode="dark"><span class="theme-item-icon" aria-hidden="true">☽</span><span>Tema escuro</span></button>
      <button class="theme-menu-item" type="button" data-theme-mode="system"><span class="theme-item-icon" aria-hidden="true">◐</span><span>Padrão do dispositivo</span></button>
    </div>
  </div>

  <script type="module">
    import { APP } from "../js/app-config.js";
    import { injectFooter } from "../js/footer.js";
    import { setupThemeSwitcher } from "../js/theme.js";

    const host = document.getElementById("contact-channels");
    const mailto = `mailto:${APP.contactEmail}?subject=Suporte%20Servix`;
    const wa = `https://wa.me/${APP.contactWhatsApp}?text=${encodeURIComponent("Olá, preciso de ajuda com o Servix Solutions.")}`;

    host.innerHTML = `
      <article class="contact-card">
        <h3>📧 E-mail</h3>
        <p>Envie sua dúvida, sugestão ou problema técnico.</p>
        <a class="btn btn-small" href="${mailto}">${APP.contactEmail}</a>
      </article>
    `;

    injectFooter();
    setupThemeSwitcher();
  </script>
</body>
</html>
